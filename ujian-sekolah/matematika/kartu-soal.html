<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kartu Soal US Matematika — SDM 01 Kukusan</title>
  <script>
    window.MathJax = { tex: { inlineMath: [['$','$'],['\\(','\\)']] }, svg: { fontCache:'global' } };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:   #1a5c35; --green-md: #2d7a4f; --green-lt: #f0faf4; --green-bdr: #b7dfc8;
      --gold:    #f5a623; --gold-dk:  #c47f00;
      --text:    #111;    --muted:    #555;
      --bg:      #f0f4f1; --white:    #fff; --border: #999;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body { font-family: 'Plus Jakarta Sans', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── TOPNAV ── */
    .topnav { background: var(--green); height: 48px; display: flex; align-items: center; padding: 0 20px; gap: 8px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .topnav a { color: rgba(255,255,255,.85); text-decoration: none; font-size: .82rem; font-weight: 600; }
    .topnav a:hover { color: #fff; text-decoration: underline; }
    .topnav-sep { color: rgba(255,255,255,.3); }
    .topnav-cur { color: rgba(255,255,255,.6); font-size: .82rem; font-weight: 600; }

    /* ── CONTROLS ── */
    .controls-bar {
      max-width: 960px; margin: 20px auto 12px; padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .ctrl-info { font-size: .8rem; color: var(--muted); }
    .ctrl-info strong { color: var(--green); font-size: 1rem; }
    .ctrl-nav { display: flex; align-items: center; gap: 10px; }
    .ctrl-nav button {
      display: flex; align-items: center; gap: 6px;
      background: var(--green); color: white; border: none;
      padding: 9px 18px; border-radius: 8px; cursor: pointer;
      font-size: .82rem; font-weight: 700; font-family: inherit;
      transition: background .15s;
    }
    .ctrl-nav button:hover { background: var(--green-md); }
    .ctrl-nav button:disabled { background: #bbb; cursor: not-allowed; }
    .counter-display {
      background: var(--white); border: 1.5px solid var(--green-bdr);
      border-radius: 8px; padding: 6px 16px;
      font-size: .82rem; font-weight: 700; color: var(--green);
      white-space: nowrap;
    }

    /* ── DOTS NAVIGATOR ── */
    .dots-nav {
      max-width: 960px; margin: 0 auto 16px; padding: 0 16px;
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .dot {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1.5px solid var(--green-bdr);
      background: var(--white); color: var(--muted);
      font-size: .7rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .dot:hover { background: var(--green-lt); color: var(--green); border-color: var(--green); }
    .dot.active { background: var(--green); color: white; border-color: var(--green); }
    .dot.pgk { border-color: #c47f00; }
    .dot.pgk.active { background: #c47f00; border-color: #c47f00; }
    .dot.pgk-cat { border-color: #6d28d9; }
    .dot.pgk-cat.active { background: #6d28d9; border-color: #6d28d9; }
    .dot.errata { box-shadow: 0 0 0 2px #f5c842; }

    /* ── KARTU ── */
    .kartu-wrap { max-width: 960px; margin: 0 auto 28px; padding: 0 16px; }

    .kartu {
      background: var(--white);
      border: 2px solid #333;
      border-radius: 0;
      overflow: hidden;
    }

    /* Title bar */
    .kartu-title {
      background: #d8d8d8;
      text-align: center;
      font-size: .92rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 7px 12px;
      border-bottom: 1.5px solid #333;
    }
    .kartu-title .errata-flag {
      display: inline-block; margin-left: 10px;
      background: #f5c842; color: #7a5000;
      font-size: .65rem; font-weight: 800; padding: 2px 7px; border-radius: 3px;
      letter-spacing: .04em; text-transform: none;
    }

    /* School info */
    .sekolah-info {
      display: grid; grid-template-columns: 1fr 1fr;
      border-bottom: 1.5px solid #333;
      padding: 8px 14px;
      font-size: .8rem;
      gap: 2px 24px;
    }
    .sekolah-row { display: flex; gap: 4px; }
    .sekolah-lbl { color: #333; min-width: 100px; }
    .sekolah-val { font-weight: 600; }

    /* Main body */
    .kartu-body {
      display: grid;
      grid-template-columns: 195px 78px 1fr;
      border-bottom: 1.5px solid #333;
      min-height: 260px;
    }

    /* Left column */
    .left-col {
      border-right: 1.5px solid #333;
      display: flex; flex-direction: column;
    }
    .left-sec {
      padding: 0;
      border-bottom: 1.5px solid #333;
      display: flex; flex-direction: column;
    }
    .left-sec:last-child { border-bottom: none; flex: 1; }
    .left-sec-label {
      font-size: .68rem; font-weight: 800; letter-spacing: .06em;
      text-transform: uppercase; background: #e8e8e8; color: #333;
      padding: 4px 8px; border-bottom: 1px solid #bbb;
    }
    .left-sec-body { font-size: .77rem; padding: 8px 9px; line-height: 1.55; color: #222; flex: 1; }

    /* Mid column */
    .mid-col {
      border-right: 1.5px solid #333;
      display: flex; flex-direction: column; align-items: stretch;
    }
    .mid-sec {
      border-bottom: 1.5px solid #333;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 6px 4px;
    }
    .mid-sec:last-child { border-bottom: none; flex: 1; }
    .mid-lbl {
      font-size: .62rem; font-weight: 800; letter-spacing: .06em;
      text-transform: uppercase; color: #555; margin-bottom: 4px; text-align: center;
    }
    .nomor-val {
      font-size: 1.7rem; font-weight: 800; color: var(--green); line-height: 1; text-align: center;
    }
    .kunci-val {
      font-size: 1.5rem; font-weight: 800; color: var(--green); text-align: center; line-height: 1.2;
    }
    .kunci-multi {
      font-size: .75rem; font-weight: 800; color: var(--green); text-align: center; line-height: 1.7;
    }
    .kunci-cat-table { font-size: .67rem; color: var(--green); font-weight: 700; text-align: left; line-height: 1.8; padding: 0 2px; }
    .kunci-cat-row { display: flex; gap: 4px; align-items: center; }
    .kunci-cat-num { min-width: 14px; color: #666; font-weight: 600; }

    /* Right column */
    .right-col { display: flex; flex-direction: column; }
    .soal-label {
      font-size: .68rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
      background: #e8e8e8; color: #333; padding: 4px 12px; border-bottom: 1px solid #bbb;
    }
    .soal-body { padding: 10px 14px; font-size: .83rem; line-height: 1.6; flex: 1; }

    /* Stimulus inside soal */
    .stimulus {
      background: #f8fdf9; border: 1px solid var(--green-bdr);
      border-left: 3.5px solid var(--green);
      border-radius: 0 4px 4px 0; padding: 8px 11px; margin-bottom: 10px;
    }
    .stim-head {
      font-size: .67rem; font-weight: 800; letter-spacing: .07em; text-transform: uppercase;
      color: var(--green); margin-bottom: 5px; padding-bottom: 4px; border-bottom: 1px dashed var(--green-bdr);
    }
    .stim-content { font-size: .8rem; line-height: 1.6; }
    .stim-content ul { list-style: none; padding-left: 4px; }
    .stim-content ul li::before { content: '• '; color: var(--green); font-weight: 700; }

    /* Image placeholder */
    .img-ph {
      background: #f0f8f4; border: 1.5px dashed var(--green-bdr);
      border-radius: 4px; padding: 10px 12px; text-align: center; margin: 6px 0;
    }
    .img-ph-icon { font-size: 1.3rem; margin-bottom: 3px; }
    .img-ph-title { font-size: .72rem; font-weight: 700; color: var(--green); margin-bottom: 2px; }
    .img-ph-desc { font-size: .68rem; color: var(--muted); }

    /* Question */
    .q-text { font-size: .85rem; font-weight: 600; color: #111; margin-bottom: 9px; line-height: 1.6; }

    /* Hint */
    .hint { font-size: .72rem; background: #fdf6e3; border-left: 3px solid var(--gold); padding: 5px 9px; margin-bottom: 8px; color: var(--gold-dk); font-weight: 600; border-radius: 0 4px 4px 0; }
    .hint-cat { font-size: .72rem; background: #edf4fb; border-left: 3px solid #1a5aaa; padding: 5px 9px; margin-bottom: 8px; color: #1a5aaa; font-weight: 600; border-radius: 0 4px 4px 0; }

    /* Options */
    .opt-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .opt-item { display: flex; gap: 8px; align-items: flex-start; padding: 5px 8px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: .8rem; line-height: 1.5; }
    .opt-letter { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: .67rem; font-weight: 800; color: #777; flex-shrink: 0; }
    .pgk-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .pgk-item { display: flex; gap: 8px; align-items: flex-start; padding: 5px 8px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: .8rem; line-height: 1.5; }
    .pgk-check { width: 18px; height: 18px; border-radius: 3px; border: 1.5px solid #ccc; flex-shrink: 0; margin-top: 1px; }

    /* Matrix table */
    .matrix-wrap { overflow-x: auto; margin-top: 4px; }
    .mtx { width: 100%; border-collapse: collapse; font-size: .76rem; }
    .mtx th { background: var(--green-lt); color: var(--green); font-size: .68rem; font-weight: 800; padding: 5px 8px; border: 1px solid #ccc; text-align: center; }
    .mtx th:first-child { text-align: left; }
    .mtx td { padding: 5px 8px; border: 1px solid #ddd; text-align: center; }
    .mtx td:first-child { text-align: left; font-weight: 500; }
    .radio-circle { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #aaa; display: inline-block; }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: auto auto auto auto auto 1fr auto;
      border-top: 1.5px solid #333;
      font-size: .72rem;
    }
    .stat-cell {
      padding: 0; border-right: 1px solid #555;
      display: flex; flex-direction: column;
    }
    .stat-cell:last-child { border-right: none; }
    .stat-top {
      font-size: .6rem; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
      background: #e0e0e0; padding: 3px 8px; border-bottom: 1px solid #bbb; text-align: center; color: #444;
    }
    .stat-val { padding: 4px 8px; font-weight: 700; text-align: center; color: #222; }
    .stat-val.lg { font-size: .85rem; font-weight: 800; color: var(--green); }

    /* Proporsi sub-grid */
    .stat-proporsi { }
    .stat-proporsi .stat-top { }
    .proporsi-inner { display: grid; grid-template-columns: repeat(4, 1fr); }
    .prop-sub { border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; }
    .prop-sub:last-child { border-right: none; }
    .prop-letter { font-size: .6rem; font-weight: 800; background: #f0f0f0; padding: 2px 0; width: 100%; text-align: center; border-bottom: 1px solid #ddd; }
    .prop-val { font-size: .72rem; font-weight: 700; padding: 3px 6px; color: #555; }

    /* Elemen badge */
    .el-badge { display: inline-block; font-size: .62rem; font-weight: 800; padding: 2px 6px; border-radius: 3px; margin-bottom: 4px; letter-spacing: .04em; text-transform: uppercase; }
    .el-bil { background: #e3f0ff; color: #1a5aaa; }
    .el-alj { background: #f0e3ff; color: #6d28d9; }
    .el-peng { background: #dcfce7; color: #166534; }
    .el-geo { background: #fef9c3; color: #854d0e; }
    .el-data { background: #fee2e2; color: #991b1b; }

    /* FOOTER */
    .site-footer { text-align: center; padding: 20px; font-size: .75rem; color: var(--muted); border-top: 1px solid #ddd; background: var(--white); margin-top: 8px; }

    @media (max-width: 680px) {
      .kartu-body { grid-template-columns: 150px 60px 1fr; }
      .sekolah-info { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: repeat(4, 1fr); font-size: .65rem; }
    }

    @media print {
      .topnav, .controls-bar, .dots-nav, .site-footer { display: none; }
      .kartu-wrap { margin: 0; padding: 0; max-width: 100%; }
      body { background: white; }
    }
  </style>
</head>

<script>
// ════════════════════════════════════

const CP = {
  bil1: 'Menunjukkan pemahaman dan intuisi bilangan (number sense) pada bilangan cacah sampai 1.000.000; membaca, menulis, menentukan nilai tempat, membandingkan, mengurutkan, melakukan komposisi dan dekomposisi bilangan; menyelesaikan masalah yang berkaitan dengan uang; melakukan operasi penjumlahan, pengurangan, perkalian, dan pembagian bilangan cacah sampai 100.000; serta menyelesaikan masalah yang berkaitan dengan KPK dan FPB.',
  bil2: 'Membandingkan dan mengurutkan berbagai pecahan termasuk pecahan campuran, melakukan operasi penjumlahan dan pengurangan pecahan, serta melakukan operasi perkalian dan pembagian pecahan dengan bilangan asli; mengubah pecahan menjadi berbagai bentuk pecahan lain, serta membandingkan dan mengurutkan bilangan desimal (satu angka di belakang koma).',
  alj:  'Menemukan nilai yang belum diketahui dalam kalimat matematika yang melibatkan penjumlahan, pengurangan, perkalian, dan pembagian pada bilangan cacah sampai 1000 menggunakan sifat-sifat bilangan dan operasinya. Mengidentifikasi, meniru, dan mengembangkan pola bilangan membesar dan mengecil yang melibatkan perkalian dan pembagian; bernalar secara proporsional untuk menyelesaikan masalah sehari-hari dengan rasio satuan; menggunakan operasi perkalian dan pembagian dalam menyelesaikan masalah sehari-hari yang terkait dengan proporsi.',
  peng: 'Menentukan keliling dan luas berbagai bentuk bangun datar (segitiga, segiempat, dan segi banyak) serta gabungannya; menghitung durasi waktu dan mengukur besar sudut pada bangun datar atau yang dibentuk dari dua garis berpotongan.',
  geo:  'Mengkonstruksi dan mengurai bangun ruang (kubus, balok, dan gabungannya) dan mengenali visualisasi spasial (bagian depan, atas, dan samping); membandingkan karakteristik antar bangun datar dan antar bangun ruang; serta menentukan lokasi pada peta yang menggunakan sistem berpetak.',
  data: 'Mengurutkan, membandingkan, menyajikan, dan menganalisis data banyak benda dan data hasil pengukuran dalam bentuk gambar, piktogram, diagram batang, dan tabel frekuensi untuk mendapatkan informasi; menentukan kejadian dengan kemungkinan yang lebih besar atau lebih kecil dalam suatu percobaan acak.'
};

// imgPlaceholder helper
function imgPH(icon, title, desc) {
  return `<div class="img-ph"><div class="img-ph-icon">${icon}</div><div class="img-ph-title">${title}</div><div class="img-ph-desc">${desc}</div></div>`;
}

const SOAL = [
  // ── 1 ──
  { id:1, type:'pg', el:'Bilangan', lv:'L1', errata:false,
    cp: CP.bil1, materi:'Nilai Tempat & Komposisi',
    indikator:'Disajikan bilangan cacah besar (jumlah penduduk kota). Siswa dapat <strong>menentukan</strong> nilai tempat dari angka tertentu dalam bilangan tersebut.',
    kunci:'A',
    soal:`<div class="stimulus"><div class="stim-head">Data Penduduk Kota</div><div class="stim-content">Jumlah penduduk sebuah kota adalah <strong>485.729</strong> jiwa.</div></div>
<p class="q-text">Angka <strong>8</strong> pada bilangan tersebut menempati nilai tempat …</p>
<ol class="opt-list"><li class="opt-item"><span class="opt-letter">A</span>Puluhan ribu</li><li class="opt-item"><span class="opt-letter">B</span>Ratusan ribu</li><li class="opt-item"><span class="opt-letter">C</span>Puluhan</li><li class="opt-item"><span class="opt-letter">D</span>Ratusan</li></ol>`
  },
  // ── 2 ──
  { id:2, type:'pg', el:'Bilangan', lv:'L2', errata:true,
    cp: CP.bil1, materi:'Operasi Hitung Uang',
    indikator:'Disajikan daftar harga barang di koperasi sekolah. Siswa dapat <strong>menghitung</strong> total biaya dan kembalian berdasarkan jumlah barang yang dibeli.',
    kunci:'B',
    soal:`<div class="stimulus"><div class="stim-head">Belanja di Koperasi</div><div class="stim-content">Daftar harga barang:<ul><li>Buku tulis: Rp 4.500</li><li>Pensil: Rp 2.000</li><li>Penghapus: Rp 1.500 <em style="color:#c47f00;font-size:.8em;">(⚠ errata: seharusnya Rp 2.000)</em></li></ul>Rina membeli 3 buku tulis, 2 pensil, dan 1 penghapus, membayar Rp 25.000.</div></div>
<p class="q-text">Berapa kembalian yang diterima Rina?</p>
<ol class="opt-list"><li class="opt-item"><span class="opt-letter">A</span>Rp 5.000</li><li class="opt-item"><span class="opt-letter">B</span>Rp 5.500</li><li class="opt-item"><span class="opt-letter">C</span>Rp 6.000</li><li class="opt-item"><span class="opt-letter">D</span>Rp 6.500</li></ol>`
  },
  // ── 3 ──
  { id:3, type:'pg', el:'Bilangan', lv:'L2', errata:false,
    cp: CP.bil1, materi:'KPK & FPB',
    indikator:'Disajikan kasus jadwal dua kegiatan berulang (jadwal les). Siswa dapat <strong>menentukan</strong> kapan kedua kegiatan bertemu lagi menggunakan KPK.',
    kunci:'B',
    soal:`<div class="stimulus"><div class="stim-head">Jadwal Kegiatan</div><div class="stim-content">Andi mengikuti les matematika setiap <strong>4 hari</strong> sekali. Budi mengikuti les matematika setiap <strong>6 hari</strong> sekali. Mereka bertemu pertama kali pada tanggal 10 Januari 2026.</div></div>
<p class="q-text">Kapan mereka akan bertemu lagi untuk <strong>kedua kalinya</strong>?</p>
<ol class="opt-list"><li class="opt-item"><span class="opt-letter">A</span>Tanggal 20 Januari</li><li class="opt-item"><span class="opt-letter">B</span>Tanggal 22 Januari</li><li class="opt-item"><span class="opt-letter">C</span>Tanggal 24 Januari</li><li class="opt-item"><span class="opt-letter">D</span>Tanggal 26 Januari</li></ol>`
  },
  // ── 4 ──
  { id:4, type:'pg', el:'Bilangan', lv:'L1', errata:false,
    cp: CP.bil2, materi:'Pecahan Senilai',
    indikator:'Disajikan sebuah pecahan. Siswa dapat <strong>memilih</strong> pecahan yang nilainya sama dari opsi yang diberikan.',
    kunci:'A',

//  HELPERS
// ════════════════════════════════════
const EL_CLASS = { 'Bilangan':'el-bil', 'Aljabar':'el-alj', 'Pengukuran':'el-peng', 'Geometri':'el-geo', 'Analisis Data':'el-data' };

const TYPE_LABEL = { 'pg':'Pilihan Ganda', 'pgk':'PG Kompleks', 'pgk-cat':'PG Kategori' };

function kunciDisplay(soal) {
  if (soal.type === 'pg') {
    return `<div class="kunci-val">${soal.kunci}</div>`;
  } else if (soal.type === 'pgk') {
    return `<div class="kunci-multi">${soal.kunci.join('<br>')}</div>`;
  } else {
    // pgk-cat: show row → answer
    const k = soal.kunci;
    let html = '<div class="kunci-cat-table">';
    k.rows.forEach((r, i) => {
      const label = r.length > 10 ? r.substring(0,10)+'…' : r;
      html += `<div class="kunci-cat-row"><span class="kunci-cat-num">${i+1}.</span><span>${k.ans[i]}</span></div>`;
    });
    html += '</div>';
    return html;
  }
}

function proporsiCells(type) {
  if (type === 'pgk-cat') {
    return `<div class="proporsi-inner" style="grid-template-columns:1fr;">
      <div class="prop-sub" style="border:none;"><div class="prop-letter" style="font-size:.58rem;">Multi Kategori</div><div class="prop-val">—</div></div>
    </div>`;
  }
  return `<div class="proporsi-inner">
    <div class="prop-sub"><div class="prop-letter">A</div><div class="prop-val">—</div></div>
    <div class="prop-sub"><div class="prop-letter">B</div><div class="prop-val">—</div></div>
    <div class="prop-sub"><div class="prop-letter">C</div><div class="prop-val">—</div></div>
    <div class="prop-sub"><div class="prop-letter">D</div><div class="prop-val">—</div></div>
  </div>`;
}

let current = 0;

  const html = `

  // Update controls
  const n = idx + 1;
  document.getElementById('curr-num').textContent = n;

  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });

  // MathJax re-typeset
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([document.getElementById('kartu-el')]).catch(e => console.warn(e));
  }

  // Scroll to top of card
  document.querySelector('.kartu-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nav(dir) {
  const newIdx = current + dir;
  if (newIdx < 0 || newIdx >= SOAL.length) return;
  current = newIdx;
  render(current);
}

function goTo(idx) {
  current = idx;
  render(current);
}

// Build dots navigator
function buildDots() {
  const container = document.getElementById('dots-nav');
  SOAL.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'dot ' + s.type + (s.errata ? ' errata' : '');
    d.textContent = s.id;
    d.title = `Soal ${s.id} — ${s.el} — ${TYPE_LABEL[s.type]}${s.errata ? ' (⚠ Errata)' : ''}`;
    d.onclick = () => goTo(i);
    container.appendChild(d);
  });
}

// Init
buildDots();
render(0);

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nav(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   nav(-1);
});
</script>
