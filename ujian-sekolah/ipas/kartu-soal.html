<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kartu Soal US IPAS — SDM 01 Kukusan</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:    #0e7490; --teal-md: #1a849a; --teal-lt: #ecfeff; --teal-bdr: #a5d8e0;
      --gold:    #f5a623; --gold-dk:  #c47f00;
      --text:    #111;    --muted:    #555;
      --bg:      #f0fafd; --white:    #fff; --border: #999;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body { font-family: 'Plus Jakarta Sans', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── TOPNAV ── */
    .topnav { background: var(--teal); height: 48px; display: flex; align-items: center; padding: 0 20px; gap: 8px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .topnav a { color: rgba(255,255,255,.85); text-decoration: none; font-size: .82rem; font-weight: 600; }
    .topnav a:hover { color: #fff; text-decoration: underline; }
    .topnav-sep { color: rgba(255,255,255,.3); }
    .topnav-cur { color: rgba(255,255,255,.6); font-size: .82rem; font-weight: 600; }

    /* ── CONTROLS ── */
    .controls-bar {
      max-width: 960px; margin: 20px auto 12px; padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .ctrl-info { font-size: .8rem; color: var(--muted); }
    .ctrl-info strong { color: var(--teal); font-size: 1rem; }
    .ctrl-nav { display: flex; align-items: center; gap: 10px; }
    .ctrl-nav button {
      display: flex; align-items: center; gap: 6px;
      background: var(--teal); color: white; border: none;
      padding: 9px 18px; border-radius: 8px; cursor: pointer;
      font-size: .82rem; font-weight: 700; font-family: inherit;
      transition: background .15s;
    }
    .ctrl-nav button:hover { background: var(--teal-md); }
    .ctrl-nav button:disabled { background: #bbb; cursor: not-allowed; }
    .counter-display {
      background: var(--white); border: 1.5px solid var(--teal-bdr);
      border-radius: 8px; padding: 6px 16px;
      font-size: .82rem; font-weight: 700; color: var(--teal);
      white-space: nowrap;
    }

    /* ── DOTS NAVIGATOR ── */
    .dots-nav {
      max-width: 960px; margin: 0 auto 16px; padding: 0 16px;
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .dot {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1.5px solid var(--teal-bdr);
      background: var(--white); color: var(--muted);
      font-size: .7rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .dot:hover { background: var(--teal-lt); color: var(--teal); border-color: var(--teal); }
    .dot.active { background: var(--teal); color: white; border-color: var(--teal); }
    .dot.pgk { border-color: #c47f00; }
    .dot.pgk.active { background: #c47f00; border-color: #c47f00; }
    .dot.pgk-cat { border-color: #6d28d9; }
    .dot.pgk-cat.active { background: #6d28d9; border-color: #6d28d9; }

    /* ── KARTU ── */
    .kartu-wrap { max-width: 960px; margin: 0 auto 28px; padding: 0 16px; }

    .kartu {
      background: var(--white);
      border: 2px solid #333;
      border-radius: 0;
      overflow: hidden;
    }

    /* Title bar */
    .kartu-title {
      background: #d8d8d8;
      text-align: center;
      font-size: .92rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 7px 12px;
      border-bottom: 1.5px solid #333;
    }

    /* School info */
    .sekolah-info {
      display: grid; grid-template-columns: 1fr 1fr;
      border-bottom: 1.5px solid #333;
      padding: 8px 14px;
      font-size: .8rem;
      gap: 2px 24px;
    }
    .sekolah-row { display: flex; gap: 4px; }
    .sekolah-lbl { color: #333; min-width: 100px; }
    .sekolah-val { font-weight: 600; }

    /* Main body */
    .kartu-body {
      display: grid;
      grid-template-columns: 195px 78px 1fr;
      border-bottom: 1.5px solid #333;
      min-height: 260px;
    }

    /* Left column */
    .left-col {
      border-right: 1.5px solid #333;
      display: flex; flex-direction: column;
    }
    .left-sec {
      padding: 0;
      border-bottom: 1.5px solid #333;
      display: flex; flex-direction: column;
    }
    .left-sec:last-child { border-bottom: none; flex: 1; }
    .left-sec-label {
      font-size: .68rem; font-weight: 800; letter-spacing: .06em;
      text-transform: uppercase; background: #e8e8e8; color: #333;
      padding: 4px 8px; border-bottom: 1px solid #bbb;
    }
    .left-sec-body { font-size: .77rem; padding: 8px 9px; line-height: 1.55; color: #222; flex: 1; }

    /* Mid column */
    .mid-col {
      border-right: 1.5px solid #333;
      display: flex; flex-direction: column; align-items: stretch;
    }
    .mid-sec {
      border-bottom: 1.5px solid #333;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 6px 4px;
    }
    .mid-sec:last-child { border-bottom: none; flex: 1; }
    .mid-lbl {
      font-size: .62rem; font-weight: 800; letter-spacing: .06em;
      text-transform: uppercase; color: #555; margin-bottom: 4px; text-align: center;
    }
    .nomor-val {
      font-size: 1.7rem; font-weight: 800; color: var(--teal); line-height: 1; text-align: center;
    }
    .kunci-val {
      font-size: 1.5rem; font-weight: 800; color: var(--teal); text-align: center; line-height: 1.2;
    }
    .kunci-multi {
      font-size: .75rem; font-weight: 800; color: var(--teal); text-align: center; line-height: 1.7;
    }
    .kunci-cat-table { font-size: .67rem; color: var(--teal); font-weight: 700; text-align: left; line-height: 1.8; padding: 0 2px; }
    .kunci-cat-row { display: flex; gap: 4px; align-items: center; }
    .kunci-cat-num { min-width: 14px; color: #666; font-weight: 600; }

    /* Right column */
    .right-col { display: flex; flex-direction: column; }
    .soal-label {
      font-size: .68rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
      background: #e8e8e8; color: #333; padding: 4px 12px; border-bottom: 1px solid #bbb;
    }
    .soal-body { padding: 10px 14px; font-size: .83rem; line-height: 1.6; flex: 1; }

    /* Stimulus */
    .stimulus {
      background: #f0fafd; border: 1px solid var(--teal-bdr);
      border-left: 3.5px solid var(--teal);
      border-radius: 0 4px 4px 0; padding: 8px 11px; margin-bottom: 10px;
    }
    .stim-head {
      font-size: .67rem; font-weight: 800; letter-spacing: .07em; text-transform: uppercase;
      color: var(--teal); margin-bottom: 5px; padding-bottom: 4px; border-bottom: 1px dashed var(--teal-bdr);
    }
    .stim-content { font-size: .8rem; line-height: 1.6; }
    .stim-content ul { list-style: none; padding-left: 4px; }
    .stim-content ul li::before { content: '• '; color: var(--teal); font-weight: 700; }
    .stim-content table { border-collapse: collapse; width: 100%; font-size: .76rem; margin-top: 6px; }
    .stim-content th { background: var(--teal-lt); color: var(--teal); font-size: .68rem; font-weight: 800; padding: 4px 8px; border: 1px solid var(--teal-bdr); text-align: center; }
    .stim-content td { padding: 4px 8px; border: 1px solid #ccc; text-align: center; }
    .stim-content td:first-child { text-align: left; font-weight: 500; }

    /* Question */
    .q-text { font-size: .85rem; font-weight: 600; color: #111; margin-bottom: 9px; line-height: 1.6; }

    /* Hint */
    .hint { font-size: .72rem; background: #fdf6e3; border-left: 3px solid var(--gold); padding: 5px 9px; margin-bottom: 8px; color: var(--gold-dk); font-weight: 600; border-radius: 0 4px 4px 0; }
    .hint-cat { font-size: .72rem; background: #edf4fb; border-left: 3px solid #1a5aaa; padding: 5px 9px; margin-bottom: 8px; color: #1a5aaa; font-weight: 600; border-radius: 0 4px 4px 0; }

    /* Options */
    .opt-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .opt-item { display: flex; gap: 8px; align-items: flex-start; padding: 5px 8px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: .8rem; line-height: 1.5; }
    .opt-letter { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: .67rem; font-weight: 800; color: #777; flex-shrink: 0; }
    .pgk-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .pgk-item { display: flex; gap: 8px; align-items: flex-start; padding: 5px 8px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: .8rem; line-height: 1.5; }
    .pgk-check { width: 18px; height: 18px; border-radius: 3px; border: 1.5px solid #ccc; flex-shrink: 0; margin-top: 1px; }

    /* Matrix table */
    .matrix-wrap { overflow-x: auto; margin-top: 4px; }
    .mtx { width: 100%; border-collapse: collapse; font-size: .76rem; }
    .mtx th { background: var(--teal-lt); color: var(--teal); font-size: .68rem; font-weight: 800; padding: 5px 8px; border: 1px solid var(--teal-bdr); text-align: center; }
    .mtx th:first-child { text-align: left; }
    .mtx td { padding: 5px 8px; border: 1px solid #ddd; text-align: center; }
    .mtx td:first-child { text-align: left; font-weight: 500; font-size: .78rem; }
    .radio-circle { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #aaa; display: inline-block; }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: auto auto auto auto auto 1fr auto;
      border-top: 1.5px solid #333;
      font-size: .72rem;
    }
    .stat-cell {
      padding: 0; border-right: 1px solid #555;
      display: flex; flex-direction: column;
    }
    .stat-cell:last-child { border-right: none; }
    .stat-top {
      font-size: .6rem; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
      background: #e0e0e0; padding: 3px 8px; border-bottom: 1px solid #bbb; text-align: center; color: #444;
    }
    .stat-val { padding: 4px 8px; font-weight: 700; text-align: center; color: #222; }
    .stat-val.lg { font-size: .85rem; font-weight: 800; color: var(--teal); }

    /* Proporsi sub-grid */
    .proporsi-inner { display: grid; grid-template-columns: repeat(4, 1fr); }
    .prop-sub { border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; }
    .prop-sub:last-child { border-right: none; }
    .prop-letter { font-size: .6rem; font-weight: 800; background: #f0f0f0; padding: 2px 0; width: 100%; text-align: center; border-bottom: 1px solid #ddd; }
    .prop-val { font-size: .72rem; font-weight: 700; padding: 3px 6px; color: #555; }

    /* Elemen badge */
    .el-badge { display: inline-block; font-size: .62rem; font-weight: 800; padding: 2px 6px; border-radius: 3px; margin-bottom: 4px; letter-spacing: .04em; text-transform: uppercase; }
    .el-mkhlk  { background: #dcfce7; color: #166534; }
    .el-energi { background: #fef9c3; color: #854d0e; }
    .el-bumi   { background: #e0f2fe; color: #0369a1; }
    .el-sos    { background: #fce7f3; color: #9d174d; }
    .el-proses { background: #f3e8ff; color: #6d28d9; }

    /* FOOTER */
    .site-footer { text-align: center; padding: 20px; font-size: .75rem; color: var(--muted); border-top: 1px solid #ddd; background: var(--white); margin-top: 8px; }

    @media (max-width: 680px) {
      .kartu-body { grid-template-columns: 150px 60px 1fr; }
      .sekolah-info { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: repeat(4, 1fr); font-size: .65rem; }
    }

    @media print {
      .topnav, .controls-bar, .dots-nav, .site-footer { display: none; }
      .kartu-wrap { margin: 0; padding: 0; max-width: 100%; }
      body { background: white; }
    }
  </style>
</head>

<ol class="opt-list"><li class="opt-item"><span class="opt-letter">A</span>Inflasi — kenaikan harga semua barang dan jasa secara umum dan berkelanjutan</li><li class="opt-item"><span class="opt-letter">B</span>Resesi — penurunan aktivitas ekonomi dalam jangka waktu tertentu</li><li class="opt-item"><span class="opt-letter">C</span>Kelangkaan — kondisi ketidakseimbangan antara ketersediaan terbatas dan permintaan yang tinggi</li><li class="opt-item"><span class="opt-letter">D</span>Monopoli — penguasaan pasar oleh satu pihak sehingga menentukan harga sepihak</li></ol>`
  },
  // ── 39 ── Sosial | PG Kompleks | L2
  { id:39, type:'pgk', el:'Masyarakat & Sosial', lv:'L2', errata:false,
    cp: CP.sos10, materi:'Sumber Sejarah Tertulis',
    indikator:'Disajikan gambar empat benda. Siswa dapat <strong>memilih lebih dari satu</strong> benda yang termasuk kategori sumber sejarah tertulis.',
    kunci:['B','C'],
    soal:`<div class="stimulus"><div class="stim-head">Empat Benda Peninggalan Sejarah</div><div class="stim-content"><ul><li><strong>Benda A:</strong> Keris pusaka milik Pangeran Diponegoro, terbuat dari besi pamor, tanpa prasasti atau tulisan</li><li><strong>Benda B:</strong> Prasasti Yupa (abad ke-4 M) — tiang batu dari Kerajaan Kutai yang berisi tulisan Sansekerta tentang upacara dan raja yang berkuasa</li><li><strong>Benda C:</strong> Buku catatan harian (diary) pejuang kemerdekaan berisi tulisan tangan pengalaman berjuang</li><li><strong>Benda D:</strong> Foto hitam-putih suasana proklamasi kemerdekaan 1945 tanpa teks</li></ul></div></div>
<p class="hint">☑ Pilih <strong>lebih dari satu</strong> jawaban yang benar.</p>
<p class="q-text">Benda yang termasuk <strong>sumber sejarah tertulis</strong> adalah …</p>
<ul class="pgk-list"><li class="pgk-item"><span class="pgk-check"></span>A. Keris pusaka Pangeran Diponegoro</li><li class="pgk-item"><span class="pgk-check"></span>B. Prasasti Yupa — mengandung tulisan/teks kuno yang dapat dibaca</li><li class="pgk-item"><span class="pgk-check"></span>C. Buku catatan harian pejuang — berisi tulisan tangan yang memuat informasi sejarah</li><li class="pgk-item"><span class="pgk-check"></span>D. Foto hitam-putih proklamasi kemerdekaan tanpa teks</li></ul>`
  },
  // ── 40 ── Keterampilan Proses | PG Tunggal | L3
  { id:40, type:'pg', el:'Keterampilan Proses', lv:'L3', errata:false,
    cp: CP.proses8, materi:'Refleksi & Perbaikan Prosedur Eksperimen',
    indikator:'Disajikan kasus eksperimen yang bermasalah (sendok pengaduk berbeda ukuran). Siswa dapat <strong>menentukan</strong> langkah refleksi dan perbaikan yang paling tepat untuk meningkatkan validitas eksperimen.',
    kunci:'C',
    soal:`<div class="stimulus"><div class="stim-head">Kasus: Eksperimen Kelarutan Garam yang Bermasalah</div><div class="stim-content">Kelompok Adi menguji kecepatan larut garam dalam tiga kondisi suhu air: panas, hangat, dan dingin. Setelah selesai, mereka menyadari bahwa:<ul><li>Garam diaduk menggunakan sendok yang berbeda ukuran untuk tiap gelas (besar, sedang, kecil)</li><li>Kesimpulan yang dihasilkan berbeda-beda dan tidak konsisten</li></ul>Akibatnya, mereka tidak yakin apakah perbedaan kecepatan larut disebabkan oleh suhu air atau oleh perbedaan ukuran sendok pengaduk.</div></div>
<p class="q-text">Langkah refleksi dan perbaikan yang <strong>paling tepat</strong> untuk meningkatkan validitas eksperimen di atas adalah …</p>
<ol class="opt-list"><li class="opt-item"><span class="opt-letter">A</span>Menambah jumlah pengulangan percobaan tanpa mengubah prosedur apa pun</li><li class="opt-item"><span class="opt-letter">B</span>Mengganti garam dengan jenis garam yang berbeda merek dan ukuran kristal</li><li class="opt-item"><span class="opt-letter">C</span>Mengulangi eksperimen dengan menggunakan sendok pengaduk yang sama ukuran dan bentuknya untuk semua perlakuan</li><li class="opt-item"><span class="opt-letter">D</span>Mengubah semua variabel (suhu air, jenis garam, dan sendok) secara bersamaan agar lebih efisien</li></ol>`
  },
];

// ════════════════════════════════════
//  LOOKUP TABLES
// ════════════════════════════════════
const EL_CLASS = {
  'Makhluk Hidup': 'el-mkhlk',
  'Energi': 'el-energi',
  'Bumi & Alam Semesta': 'el-bumi',
  'Masyarakat & Sosial': 'el-sos',
  'Keterampilan Proses': 'el-proses'
};

const TYPE_LABEL = { 'pg':'Pilihan Ganda', 'pgk':'PG Kompleks', 'pgk-cat':'PG Kategori' };

function kunciDisplay(soal) {
  if (soal.type === 'pg') {
    return `<div class="kunci-val">${soal.kunci}</div>`;
  } else if (soal.type === 'pgk') {
    return `<div class="kunci-multi">${soal.kunci.join('<br>')}</div>`;
  } else {
    const k = soal.kunci;
    let html = '<div class="kunci-cat-table">';
    k.rows.forEach((r, i) => {
      const label = r.length > 14 ? r.substring(0,14)+'…' : r;
      html += `<div class="kunci-cat-row"><span class="kunci-cat-num">${i+1}.</span><span style="font-size:.62rem;">${k.ans[i]}</span></div>`;
    });
    html += '</div>';
    return html;
  }
}

function proporsiCells(type) {
  if (type === 'pgk-cat') {
    return `<div class="proporsi-inner" style="grid-template-columns:1fr;">
      <div class="prop-sub" style="border:none;"><div class="prop-letter" style="font-size:.58rem;">Multi Kategori</div><div class="prop-val">—</div></div>
    </div>`;
  }
  return `<div class="proporsi-inner">
    <div class="prop-sub"><div class="prop-letter">A</div><div class="prop-val">—</div></div>
    <div class="prop-sub"><div class="prop-letter">B</div><div class="prop-val">—</div></div>
    <div class="prop-sub"><div class="prop-letter">C</div><div class="prop-val">—</div></div>
    <div class="prop-sub"><div class="prop-letter">D</div><div class="prop-val">—</div></div>
  </div>`;
}

// ════════════════════════════════════
//  RENDER
// ════════════════════════════════════
let current = 0;

function render(idx) {
  const s = SOAL[idx];
  const elClass = EL_CLASS[s.el] || 'el-proses';
  const typeLabel = TYPE_LABEL[s.type] || s.type.toUpperCase();
  const errataBadge = s.errata ? '<span class="errata-flag">⚠ Errata</span>' : '';
  const kelompok = s.id <= 20 ? 'Kelompok 1 — Sesi 1' : 'Kelompok 2 — Sesi 2';

  const html = `
  <div class="kartu-title">KARTU SOAL ${typeLabel.toUpperCase()}${errataBadge}</div>

  <div class="sekolah-info">
    <div>
      <div class="sekolah-row"><span class="sekolah-lbl">Sekolah</span><span class="sekolah-val">: SD Muhammadiyah 01 Kukusan</span></div>
      <div class="sekolah-row"><span class="sekolah-lbl">Fase/Kelas</span><span class="sekolah-val">: C / VI (Enam)</span></div>
      <div class="sekolah-row"><span class="sekolah-lbl">Kurikulum</span><span class="sekolah-val">: Merdeka</span></div>
    </div>
    <div>
      <div class="sekolah-row"><span class="sekolah-lbl">Mata Pelajaran</span><span class="sekolah-val">: IPAS</span></div>
      <div class="sekolah-row"><span class="sekolah-lbl">Tahun Ajaran</span><span class="sekolah-val">: 2025/2026</span></div>
      <div class="sekolah-row"><span class="sekolah-lbl">Kelompok Soal</span><span class="sekolah-val">: ${kelompok}</span></div>
    </div>
  </div>

  <div class="kartu-body">
    <!-- LEFT -->
    <div class="left-col">
      <div class="left-sec">
        <div class="left-sec-label">Capaian Pembelajaran</div>
        <div class="left-sec-body"><span class="el-badge ${elClass}">${s.el}</span><br>${s.cp}</div>
      </div>
      <div class="left-sec">
        <div class="left-sec-label">Materi</div>
        <div class="left-sec-body">${s.materi}</div>
      </div>
      <div class="left-sec">
        <div class="left-sec-label">Indikator Soal</div>
        <div class="left-sec-body">${s.indikator}</div>
      </div>
    </div>

    <!-- MID -->
    <div class="mid-col">
      <div class="mid-sec">
        <div class="mid-lbl">Nomor</div>
        <div class="nomor-val">${s.id}</div>
      </div>
      <div class="mid-sec" style="flex:1;">
        <div class="mid-lbl">Kunci</div>
        ${kunciDisplay(s)}
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-col">
      <div class="soal-label">Soal</div>
      <div class="soal-body">${s.soal}</div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-cell">
      <div class="stat-top">Digunakan untuk</div>
      <div class="stat-val">Ujian Sekolah</div>
    </div>
    <div class="stat-cell">
      <div class="stat-top">Tanggal</div>
      <div class="stat-val">7 Mei 2026</div>
    </div>
    <div class="stat-cell">
      <div class="stat-top">Jumlah Siswa</div>
      <div class="stat-val">—</div>
    </div>
    <div class="stat-cell">
      <div class="stat-top">Kompleksitas</div>
      <div class="stat-val lg">${s.lv}</div>
    </div>
    <div class="stat-cell">
      <div class="stat-top">Daya Pembeda</div>
      <div class="stat-val">—</div>
    </div>
    <div class="stat-cell stat-proporsi">
      <div class="stat-top">Proporsi Jawaban</div>
      ${proporsiCells(s.type)}
    </div>
    <div class="stat-cell">
      <div class="stat-top">Ket.</div>
      <div class="stat-val">${s.errata ? '⚠' : ''}</div>
    </div>
  </div>`;

  document.getElementById('kartu-el').innerHTML = html;

  // Update controls
  const n = idx + 1;
  document.getElementById('curr-num').textContent = n;
  document.getElementById('counter-display').textContent = `${n} / ${SOAL.length}`;
  document.getElementById('counter-display2').textContent = `${n} / ${SOAL.length}`;
  document.getElementById('curr-type-info').textContent = typeLabel;
  document.getElementById('curr-elemen-info').innerHTML = `<span class="el-badge ${elClass}">${s.el}</span>`;

  const prevBtns = [document.getElementById('btn-prev'), document.getElementById('btn-prev2')];
  const nextBtns = [document.getElementById('btn-next'), document.getElementById('btn-next2')];
  prevBtns.forEach(b => b.disabled = idx === 0);
  nextBtns.forEach(b => b.disabled = idx === SOAL.length - 1);

  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });

  document.querySelector('.kartu-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nav(dir) {
  const newIdx = current + dir;
  if (newIdx < 0 || newIdx >= SOAL.length) return;
  current = newIdx;
  render(current);
}

function goTo(idx) {
  current = idx;
  render(current);
}

function buildDots() {
  const container = document.getElementById('dots-nav');
  SOAL.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'dot ' + s.type + (s.errata ? ' errata' : '');
    d.textContent = s.id;
    d.title = `Soal ${s.id} — ${s.el} — ${TYPE_LABEL[s.type]}`;
    d.onclick = () => goTo(i);
    container.appendChild(d);
  });
}

buildDots();
render(0);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nav(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   nav(-1);
});
</script>
</body>
</html>
